      #     docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
      #       ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
      #     docker push ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-aks:
    name: Deploy to Azure Kubernetes Service
    needs: docker-build-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Uncomment when Azure credentials are configured:
      # - name: Azure Login
      #   uses: azure/login@v1
      #   with:
      #     creds: ${{ secrets.AZURE_CREDENTIALS }}
      #
      # - name: Set AKS context
      #   uses: azure/aks-set-context@v3
      #   with:
      #     resource-group: ${{ env.RESOURCE_GROUP }}
      #     cluster-name: ${{ env.CLUSTER_NAME }}
      #
      # - name: Deploy to Kubernetes
      #   run: |
      #     kubectl apply -f backend/kubernetes/deployments/
      #     kubectl set image deployment/twinfi-api \
      #       twinfi-api=${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
      #       --namespace twinfi-prod
      #     kubectl rollout status deployment/twinfi-api --namespace twinfi-prod

      - name: Deploy (placeholder)
        run: echo "Deployment to AKS with image tag ${{ needs.docker-build-push.outputs.image_tag }}"
