<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TwinFi AI – Premium AI Insights</title>
<meta name="description" content="Premium AI-generated financial insights curated by your Living Financial Twin. Proactive alerts, saving opportunities, and market intelligence."/>
<link rel="stylesheet" href="../assets/css/design-system.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../assets/js/api-client.js"></script>
<style>
html,body{height:100%;margin:0;background:var(--bg-primary);}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;}
.phone-wrap{padding:40px 20px;}
.phone{width:390px;height:844px;background:var(--bg-primary);border-radius:50px;box-shadow:0 0 0 8px #1c1c2e,0 40px 80px rgba(0,0,0,0.8),0 0 80px rgba(0,245,255,0.1);position:relative;overflow:hidden;display:flex;flex-direction:column;}
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 30px;font-size:13px;font-weight:600;flex-shrink:0;}
.ins-scroll{flex:1;overflow-y:auto;}.ins-scroll::-webkit-scrollbar{display:none;}
.ins-header{padding:12px 22px;position:sticky;top:0;z-index:10;background:rgba(5,8,22,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.04);display:flex;align-items:center;justify-content:space-between;}
.back-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;}
.page-title{font-family:var(--font-display);font-size:17px;font-weight:700;}

/* AI Banner */
.ai-banner{
  margin:16px 22px;padding:22px;
  background:linear-gradient(135deg,rgba(0,245,255,0.1),rgba(138,43,226,0.12));
  border:1px solid rgba(0,245,255,0.25);border-radius:28px;
  text-align:center;position:relative;overflow:hidden;
}
.ai-banner::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(0,245,255,0.06);top:-50px;right:-50px;filter:blur(40px);}
.ai-banner-icon{font-size:40px;animation:float 3s ease-in-out infinite;display:block;margin-bottom:10px;}
.ai-banner-title{font-family:var(--font-display);font-size:20px;font-weight:700;margin-bottom:6px;}
.ai-banner-desc{font-size:13px;color:var(--text-secondary);line-height:1.5;}
.ai-refresh{margin-top:12px;display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);}
.ai-refresh::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;animation:pulse 1.5s infinite;}

/* Insight Cards */
.insights-list{padding:0 22px;margin-bottom:16px;}
.ins-section-title{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text-secondary);margin-bottom:10px;display:flex;align-items:center;gap:6px;letter-spacing:0.05em;text-transform:uppercase;font-size:11px;}

.insight-card{
  margin-bottom:12px;padding:18px;
  border-radius:22px;border:1px solid;
  transition:var(--transition-base);cursor:pointer;position:relative;overflow:hidden;
}
.insight-card:hover{transform:translateY(-2px);}

.ic-next-action{background:linear-gradient(135deg,rgba(0,245,255,0.08),rgba(14,23,38,0.8));border-color:rgba(0,245,255,0.25);}
.ic-predicted{background:linear-gradient(135deg,rgba(0,255,157,0.06),rgba(14,23,38,0.8));border-color:rgba(0,255,157,0.2);}
.ic-risk{background:linear-gradient(135deg,rgba(255,77,109,0.06),rgba(14,23,38,0.8));border-color:rgba(255,77,109,0.2);}
.ic-opportunity{background:linear-gradient(135deg,rgba(138,43,226,0.08),rgba(14,23,38,0.8));border-color:rgba(138,43,226,0.25);}

.ic-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:var(--radius-full);font-size:10px;font-weight:700;margin-bottom:10px;}
.badge-cyan{background:rgba(0,245,255,0.12);color:var(--cyan);}
.badge-green{background:rgba(0,255,157,0.12);color:var(--success);}
.badge-red{background:rgba(255,77,109,0.12);color:var(--danger);}
.badge-purple{background:rgba(138,43,226,0.12);color:#C77DFF;}

.ic-title{font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:6px;}
.ic-body{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-bottom:12px;}
.ic-impact{display:flex;gap:10px;}
.ic-imp-item{padding:8px 12px;border-radius:12px;background:rgba(255,255,255,0.05);text-align:center;}
.ic-imp-val{font-family:var(--font-mono);font-size:14px;font-weight:700;margin-bottom:1px;}
.ic-imp-label{font-size:9px;color:var(--text-secondary);}
.ic-cta{margin-top:12px;display:flex;align-items:center;justify-content:space-between;}
.ic-action-btn{padding:8px 16px;border-radius:var(--radius-full);border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font-body);}
.ic-confidence{font-size:10px;color:var(--text-muted);display:flex;align-items:center;gap:4px;}

.ic-chart-mini{height:60px;margin-bottom:10px;}

.bottom-nav{position:absolute;bottom:0;left:0;right:0;height:76px;background:rgba(5,8,22,0.9);backdrop-filter:blur(24px);border-top:1px solid var(--border-glass);display:flex;align-items:center;justify-content:space-around;padding:0 10px;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 12px;border-radius:12px;text-decoration:none;color:var(--text-muted);}
.nav-center{width:52px;height:52px;border-radius:50%;background:var(--gradient-main);display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 0 20px rgba(0,245,255,0.4);margin-top:-20px;cursor:pointer;}
.ni{font-size:20px;}.nl{font-size:10px;font-weight:500;}
</style>
</head>
<body>
<div class="phone-wrap"><div class="phone">
  <div class="status-bar"><span style="font-family:var(--font-mono)">9:41</span><div style="font-size:11px">▌▌▌ WiFi 🔋</div></div>
  <div class="ins-scroll">
    <div class="ins-header">
      <div class="back-btn" onclick="history.back()">←</div>
      <div class="page-title">✨ Premium AI Insights</div>
      <div class="back-btn">⬆️</div>
    </div>

    <div class="ai-banner animate-fade-in">
      <span class="ai-banner-icon">🧠</span>
      <div class="ai-banner-title">Your Twin Generated 12 New Insights</div>
      <div class="ai-banner-desc">Analyzed 847 data points from your spending, investments, market data, and behavioral patterns overnight.</div>
      <div class="ai-refresh">Last refreshed: 3 minutes ago · Live sync active</div>
    </div>

    <div class="insights-list animate-fade-in delay-200" id="insightsContainer">
      <!-- Dynamically generated insight cards will go here -->
    </div>
    <div style="height:90px;"></div>
  </div>
  <div class="bottom-nav">
    <a href="home.html" class="nav-item"><div class="ni">🏠</div><div class="nl">Home</div></a>
    <a href="dna.html" class="nav-item"><div class="ni">🧬</div><div class="nl">DNA</div></a>
    <div class="nav-center" onclick="window.location.href='twin.html'">👤</div>
    <a href="investments.html" class="nav-item"><div class="ni">📊</div><div class="nl">Invest</div></a>
    <a href="profile.html" class="nav-item"><div class="ni">👤</div><div class="nl">Profile</div></a>
  </div>
</div></div>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  try {
    const insights = await window.twinfiAPI.getInsights();
    const container = document.getElementById('insightsContainer');
    
    if (insights && insights.length > 0) {
      container.innerHTML = '';
      insights.forEach(ins => {
        // Map priority to badge colors
        let badgeColor = 'badge-cyan';
        let cardClass = 'ic-next-action';
        let btnGradient = 'var(--gradient-main)';
        let btnTextColor = '#000';
        
        if (ins.priority === 'high') { badgeColor = 'badge-purple'; cardClass = 'ic-opportunity'; btnGradient = 'linear-gradient(135deg,#8A2BE2,#C77DFF)'; btnTextColor = '#fff'; }
        else if (ins.type === 'risk') { badgeColor = 'badge-red'; cardClass = 'ic-risk'; btnGradient = 'linear-gradient(135deg,#FF4D6D,#FF1744)'; btnTextColor = '#fff'; }
        
        container.innerHTML += `
          <div class="insight-card ${cardClass}" style="margin-bottom:20px;">
            <div class="ic-badge ${badgeColor}">${ins.icon} ${ins.type.replace('_', ' ').toUpperCase()}</div>
            <div class="ic-title">${ins.title}</div>
            <div class="ic-body">${ins.message}</div>
            <div class="ic-impact">
              ${ins.potential_saving ? `<div class="ic-imp-item"><div class="ic-imp-val" style="color:var(--success)">₹${ins.potential_saving}</div><div class="ic-imp-label">Potential Saving</div></div>` : ''}
            </div>
            <div class="ic-cta">
              <button class="ic-action-btn" style="background:${btnGradient};color:${btnTextColor}" onclick="window.location.href='${ins.action_url}'">${ins.action_label}</button>
              <div class="ic-confidence">🤖 90%+ confidence</div>
            </div>
          </div>
        `;
      });
    }
  } catch (err) {
    console.error('Failed to load insights API:', err);
  }
});
</script>
</body>
</html>
